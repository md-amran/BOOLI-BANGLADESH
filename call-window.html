<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Booli Call</title>

<link rel="icon" type="image/png" sizes="32x32" href="assets/booli_favicon_16.png">

  const firebaseConfig = {

<script src="https://download.agora.io/sdk/release/AgoraRTC_N.js"></script>

<!-- Font Awesome -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<!-- html2canvas for screenshot -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>
  :root {
    --bg: #050505;
    --primary: #E11D48;
    --secondary: #0B090A;
    --accent: #F43F5E;
    --text-primary: #FAFAFA;
    --text-secondary: #737373;
    --border: #1F1F1F;
    --card: #111111;
    --success: #22C55E;
    --error: #EF4444;
    --warning: #F59E0B;
    --btn: #E11D48;
    --btn-text: #FFFFFF;
    --btn-hover: #be123c;
    --sidebar-bg: #0A0A0A;
    --hover: rgba(225,29,72,0.12);
    --shadow: 0 8px 32px rgba(225,29,72,0.2), 0 4px 16px rgba(0,0,0,0.4);
  }

  [data-theme="light"] {
    --bg: #FFFFFF;
    --primary: #E11D48;
    --secondary: #FFF1F2;
    --accent: #F43F5E;
    --text-primary: #1A1A1A;
    --text-secondary: #6B7280;
    --border: #F1F1F1;
    --card: #FFF7F8;
    --success: #22C55E;
    --error: #EF4444;
    --warning: #F59E0B;
    --btn: #E11D48;
    --btn-text: #FFFFFF;
    --btn-hover: #be123c;
    --sidebar-bg: #FFFFFF;
    --hover: rgba(225,29,72,0.07);
    --shadow: 0 4px 24px rgba(0,0,0,0.08);
  }

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text-primary);
    height: 100vh;
    overflow: hidden;
    transition: background 0.3s, color 0.3s;
  }

  .call-container {
    display: flex;
    flex-direction: column;
    height: 100vh;
    background: linear-gradient(135deg, var(--bg) 0%, var(--secondary) 100%);
  }

  .call-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 16px 24px;
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    z-index: 20;
  }

  .call-header-info {
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .call-header-avatar {
    width: 48px;
    height: 48px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--primary), var(--accent));
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    font-weight: 700;
    color: white;
    box-shadow: 0 4px 12px rgba(225,29,72,0.3);
  }

  .call-header-name {
    font-size: 18px;
    font-weight: 600;
    font-family: 'Sora', sans-serif;
  }

  .call-header-status {
    font-size: 12px;
    color: var(--text-secondary);
  }

  .call-timer {
    font-family: monospace;
    font-size: 14px;
    font-weight: 500;
    color: var(--success);
  }

  .call-header-btn {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--text-primary);
    cursor: pointer;
    transition: all 0.2s;
    font-size: 18px;
  }

  .call-header-btn:hover {
    background: var(--hover);
    color: var(--primary);
    transform: scale(1.05);
  }

  .call-header-btn.mic-off {
    background: var(--error);
    color: white;
    border-color: var(--error);
  }

  .video-container {
    flex: 1;
    position: relative;
    background: #000;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  #remote-video-container {
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #000;
    position: relative;
  }

  #remote-video-container video {
    width: 100%;
    height: 100%;
    object-fit: contain;
  }

  /* Audio Call Avatar - Big and Centered */
  .audio-call-avatar {
    width: 200px;
    height: 200px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--primary), var(--accent));
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 80px;
    font-weight: 700;
    color: white;
    animation: pulse 1.5s infinite;
    box-shadow: 0 8px 32px rgba(225,29,72,0.4);
    margin: 0 auto;
  }

  @media (max-width: 600px) {
    .audio-call-avatar {
      width: 140px;
      height: 140px;
      font-size: 56px;
    }
  }

  /* Video Call PIP - Facebook Style 16:9 Ratio */
  #local-player {
    position: absolute;
    bottom: 24px;
    right: 24px;
    width: 320px;
    height: 180px;
    border-radius: 16px;
    overflow: hidden;
    border: 3px solid var(--primary);
    background: #1a1a1a;
    z-index: 15;
    cursor: grab;
    transition: all 0.2s ease;
    box-shadow: 0 8px 24px rgba(0,0,0,0.5);
    display: none;
  }
  
  #local-player.visible {
    display: block;
  }
  
  #local-player:active {
    cursor: grabbing;
  }
  
  #local-player:hover {
    transform: scale(1.02);
    border-color: var(--accent);
  }
  
  #local-player video {
    width: 100%;
    height: 100%;
    object-fit: cover;
    pointer-events: none;
  }
  
  /* Responsive PIP sizes - maintaining 16:9 ratio */
  @media (min-width: 768px) {
    #local-player {
      width: 420px;
      height: 236.25px;
    }
  }
  
  @media (min-width: 1024px) {
    #local-player {
      width: 520px;
      height: 292.5px;
    }
  }
  
  @media (min-width: 1440px) {
    #local-player {
      width: 620px;
      height: 348.75px;
    }
  }

  /* Screen share active */
  #local-player.screen-share-active {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    border-radius: 0;
    border: none;
    z-index: 10;
    background: #000;
    cursor: default;
  }
  
  #local-player.screen-share-active video {
    object-fit: contain;
  }

  /* Remote video small - 16:9 ratio */
  .remote-video-small {
    position: absolute;
    bottom: 24px;
    right: 24px;
    width: 320px;
    height: 180px;
    border-radius: 16px;
    overflow: hidden;
    border: 3px solid var(--primary);
    z-index: 20;
    background: #1a1a1a;
    cursor: grab;
    box-shadow: 0 8px 24px rgba(0,0,0,0.5);
  }
  
  @media (min-width: 768px) {
    .remote-video-small {
      width: 420px;
      height: 236.25px;
    }
  }

  @keyframes pulse {
    0%, 100% { transform: scale(1); opacity: 1; }
    50% { transform: scale(1.05); opacity: 0.9; }
  }

  /* Call Controls - Common Styles */
  .call-controls {
    display: flex;
    justify-content: center;
    gap: 20px;
    padding: 20px 24px;
    background: rgba(0,0,0,0.85);
    backdrop-filter: blur(20px);
    border-top: 1px solid var(--border);
    z-index: 20;
    flex-wrap: wrap;
  }

  .call-control-btn {
    width: 60px;
    height: 60px;
    border-radius: 50%;
    border: none;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 6px;
    cursor: pointer;
    transition: all 0.2s;
    background: var(--card);
    color: var(--text-primary);
    font-size: 22px;
    border: 1px solid var(--border);
  }

  .call-control-btn span {
    font-size: 10px;
    font-weight: 500;
  }

  .call-control-btn:hover {
    transform: scale(1.05);
    background: var(--hover);
    border-color: var(--primary);
  }

  .call-control-btn.mic-off,
  .call-control-btn.cam-off {
    background: var(--error);
    color: white;
    border-color: var(--error);
  }

  .call-control-btn.end-call {
    background: var(--error);
    color: white;
    border-color: var(--error);
  }

  .call-control-btn.end-call:hover {
    background: #dc2626;
  }
  
  .call-control-btn.recording {
    background: var(--error);
    animation: pulse-red 1s infinite;
  }
  
  .call-control-btn.raised-hand {
    background: var(--warning);
    color: white;
  }
  
  @keyframes pulse-red {
    0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); }
    70% { box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); }
    100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
  }
  
  /* Status Indicators */
  .connecting-status {
    position: absolute;
    bottom: 100px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0,0,0,0.8);
    backdrop-filter: blur(10px);
    padding: 10px 20px;
    border-radius: 30px;
    font-size: 13px;
    z-index: 25;
    color: var(--text-primary);
    border: 1px solid var(--border);
  }
  
  .screen-share-indicator {
    position: absolute;
    top: 20px;
    left: 20px;
    background: rgba(34,197,94,0.95);
    backdrop-filter: blur(10px);
    padding: 8px 16px;
    border-radius: 30px;
    font-size: 12px;
    z-index: 25;
    display: none;
    color: white;
    font-weight: 500;
  }
  
  .raised-hand-indicator {
    position: absolute;
    top: 20px;
    left: 20px;
    background: rgba(245,158,11,0.95);
    backdrop-filter: blur(10px);
    padding: 8px 16px;
    border-radius: 30px;
    font-size: 12px;
    z-index: 25;
    display: none;
    color: white;
    font-weight: 500;
  }
  
  .recording-indicator {
    position: absolute;
    top: 20px;
    right: 20px;
    background: rgba(239,68,68,0.95);
    backdrop-filter: blur(10px);
    padding: 8px 16px;
    border-radius: 30px;
    font-size: 12px;
    z-index: 25;
    display: none;
    color: white;
    font-weight: 500;
  }
  
  .recording-indicator i {
    animation: blink 1s infinite;
  }
  
  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }

  /* Add People Modal */
  .add-people-modal {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: rgba(0,0,0,0.8);
    backdrop-filter: blur(12px);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 3000;
  }
  
  .add-people-card {
    background: var(--card);
    border-radius: 24px;
    width: 350px;
    max-width: 90vw;
    padding: 24px;
    border: 1px solid var(--border);
  }
  
  .add-people-card h3 {
    margin-bottom: 16px;
    font-size: 20px;
  }
  
  .contact-search {
    width: 100%;
    padding: 12px;
    border-radius: 12px;
    border: 1px solid var(--border);
    background: var(--bg);
    color: var(--text-primary);
    margin-bottom: 16px;
  }
  
  .contact-list {
    max-height: 300px;
    overflow-y: auto;
  }
  
  .contact-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px;
    cursor: pointer;
    border-radius: 12px;
    transition: background 0.2s;
  }
  
  .contact-item:hover {
    background: var(--hover);
  }
  
  .contact-avatar {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    background: var(--primary);
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    color: white;
  }
  
  .contact-name {
    flex: 1;
    font-weight: 500;
  }
  
  .close-modal-btn {
    width: 100%;
    padding: 12px;
    margin-top: 16px;
    border-radius: 12px;
    border: none;
    background: var(--border);
    cursor: pointer;
  }

  /* Upgrade to Video Call Modal */
  .upgrade-modal {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: rgba(0,0,0,0.8);
    backdrop-filter: blur(12px);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 3000;
  }
  
  .upgrade-card {
    background: var(--card);
    border-radius: 24px;
    width: 320px;
    max-width: 90vw;
    padding: 28px;
    text-align: center;
    border: 1px solid var(--border);
  }
  
  .upgrade-card i {
    font-size: 48px;
    color: var(--primary);
    margin-bottom: 16px;
  }
  
  .upgrade-card h3 {
    margin-bottom: 12px;
    font-size: 20px;
  }
  
  .upgrade-card p {
    color: var(--text-secondary);
    margin-bottom: 24px;
    font-size: 14px;
  }
  
  .upgrade-buttons {
    display: flex;
    gap: 12px;
  }
  
  .upgrade-btn {
    flex: 1;
    padding: 12px;
    border-radius: 12px;
    border: none;
    cursor: pointer;
    font-weight: 600;
  }
  
  .upgrade-btn.accept {
    background: var(--primary);
    color: white;
  }
  
  .upgrade-btn.cancel {
    background: var(--border);
    color: var(--text-primary);
  }

  .dropdown {
    position: absolute;
    z-index: 100;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    box-shadow: var(--shadow);
    padding: 6px;
    min-width: 170px;
    animation: dropIn 0.15s ease;
  }
  
  @keyframes dropIn {
    from { opacity: 0; transform: translateY(-6px) scale(0.97); }
    to { opacity: 1; transform: none; }
  }
  
  .dropdown-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 14px;
    border-radius: 9px;
    cursor: pointer;
    font-size: 13px;
    color: var(--text-primary);
    transition: background 0.15s;
  }
  
  .dropdown-item:hover {
    background: var(--hover);
    color: var(--primary);
  }
  
  .dropdown-divider {
    height: 1px;
    background: var(--border);
    margin: 4px 0;
  }

  @media (max-width: 600px) {
    .call-header {
      padding: 12px 16px;
    }
    
    .call-header-avatar {
      width: 40px;
      height: 40px;
      font-size: 18px;
    }
    
    .call-header-name {
      font-size: 16px;
    }
    
    #local-player {
      width: 220px;
      height: 123.75px;
      bottom: 80px;
      right: 16px;
    }
    
    .remote-video-small {
      width: 220px;
      height: 123.75px;
      bottom: 80px;
      right: 16px;
    }
    
    .call-controls {
      gap: 12px;
      padding: 12px;
    }
    
    .call-control-btn {
      width: 52px;
      height: 52px;
      font-size: 18px;
    }
    
    .call-control-btn span {
      font-size: 9px;
    }
    
    .audio-call-avatar {
      width: 140px;
      height: 140px;
      font-size: 56px;
    }
  }
</style>

</head>
<body>
<div class="call-container">
  <div class="call-header">
    <div class="call-header-info">
      <div class="call-header-avatar" id="call-avatar">U</div>
      <div>
        <div class="call-header-name" id="call-name">Loading...</div>
        <div class="call-header-status" id="call-status-text">
          <span class="call-timer">00:00</span>
          <span id="call-mode-badge" style="color: var(--primary); font-size: 10px; margin-left: 6px;"></span>
        </div>
      </div>
    </div>
    <div style="display: flex; gap: 8px; position: relative;">
      <button class="call-header-btn" id="mute-header-btn" onclick="window.callManager.toggleMute()">
        <i class="fas fa-microphone"></i>
      </button>
      <div style="position: relative;">
        <button class="call-header-btn" onclick="window.callManager.toggleCallMenu(event)">
          <i class="fas fa-ellipsis-v"></i>
        </button>
        <div id="call-options-menu" class="dropdown" style="display: none; right: 0; top: 48px;">
          <div class="dropdown-item" onclick="window.callManager.toggleSpeaker()">
            <i class="fas fa-volume-up"></i> Toggle Speaker
          </div>
          <div class="dropdown-divider"></div>
          <div class="dropdown-item" id="switch-cam-option" style="display: none;" onclick="window.callManager.switchCamera()">
            <i class="fas fa-sync-alt"></i> Switch Camera
          </div>
        </div>
      </div>
    </div>
  </div>
  
  <div class="video-container">
    <div id="remote-video-container">
      <!-- Audio Call Avatar - Big and Centered -->
      <div class="audio-call-avatar" id="audio-call-avatar">
        U
      </div>
    </div>
    
    <!-- Local Video Player (PIP) - 16:9 Ratio -->
    <div id="local-player"></div>
    
    <!-- Indicators -->
    <div class="screen-share-indicator" id="screen-share-indicator">
      <i class="fas fa-desktop"></i> Screen Sharing
    </div>
    <div class="raised-hand-indicator" id="raised-hand-indicator">
      <i class="fas fa-hand-paper"></i> Hand Raised
    </div>
    <div class="recording-indicator" id="recording-indicator">
      <i class="fas fa-circle"></i> Recording
    </div>
    <div class="call-quality" id="call-quality" style="display: none;">
      <i class="fas fa-signal"></i> <span id="quality-text">Good</span>
    </div>
    <div id="connecting-status" class="connecting-status" style="display: none;">
      <i class="fas fa-spinner fa-spin"></i> Connecting to call...
    </div>
  </div>
  
  <!-- Audio Call Controls -->
  <div class="call-controls" id="audio-controls">
    <button class="call-control-btn" id="audio-mic-btn" onclick="window.callManager.toggleMute()">
      <i class="fas fa-microphone"></i>
      <span>Mute</span>
    </button>
    <button class="call-control-btn" id="goto-video-btn" onclick="window.callManager.upgradeToVideoCall()">
      <i class="fas fa-video"></i>
      <span>Go Video</span>
    </button>
    <button class="call-control-btn" id="audio-record-btn" onclick="window.callManager.toggleRecording()">
      <i class="fas fa-record-vinyl"></i>
      <span>Record</span>
    </button>
    <button class="call-control-btn" id="audio-add-people-btn" onclick="window.callManager.showAddPeople()">
      <i class="fas fa-user-plus"></i>
      <span>Add</span>
    </button>
    <button class="call-control-btn end-call" onclick="window.callManager.endCall()">
      <i class="fas fa-phone-slash"></i>
      <span>End</span>
    </button>
  </div>
  
  <!-- Video Call Controls (hidden initially) -->
  <div class="call-controls" id="video-controls" style="display: none;">
    <button class="call-control-btn" id="video-mic-btn" onclick="window.callManager.toggleMute()">
      <i class="fas fa-microphone"></i>
      <span>Mute</span>
    </button>
    <button class="call-control-btn" id="video-camera-btn" onclick="window.callManager.toggleCamera()">
      <i class="fas fa-video"></i>
      <span>Camera</span>
    </button>
    <button class="call-control-btn" id="switch-cam-btn" onclick="window.callManager.switchCamera()">
      <i class="fas fa-sync-alt"></i>
      <span>Switch</span>
    </button>
    <button class="call-control-btn" id="raise-hand-btn" onclick="window.callManager.toggleRaiseHand()">
      <i class="fas fa-hand-paper"></i>
      <span>Raise</span>
    </button>
    <button class="call-control-btn" id="video-record-btn" onclick="window.callManager.toggleRecording()">
      <i class="fas fa-record-vinyl"></i>
      <span>Record</span>
    </button>
    <button class="call-control-btn" id="video-add-people-btn" onclick="window.callManager.showAddPeople()">
      <i class="fas fa-user-plus"></i>
      <span>Add</span>
    </button>
    <button class="call-control-btn end-call" onclick="window.callManager.endCall()">
      <i class="fas fa-phone-slash"></i>
      <span>End</span>
    </button>
  </div>
</div>

<script>
class CallManager {
  constructor() {
    this.callData = null;
    this.client = null;
    this.localTracks = [];
    this.screenTrack = null;
    this.remoteVideoContainer = null;
    this.isMuted = false;
    this.isCameraOn = true;
    this.isScreenSharing = false;
    this.callTimer = null;
    this.callStartTime = null;
    this.callDuration = 0;
    this.isCallActive = false;
    this.remoteAudioSubscribed = false;
    this.remoteUserVideo = null;
    this.callEnded = false;
    this.remoteStreamSubscribed = false;
    this.isRecording = false;
    this.mediaRecorder = null;
    this.recordedChunks = [];
    this.recordingStream = null;
    this.isVideoMode = false;
    this.isHandRaised = false;
    this.availableContacts = [];
  }

  async init() {
    const callDataStr = localStorage.getItem('booli_call_data');
    if (!callDataStr) {
      alert('Invalid call session');
      window.close();
      return;
    }
    
    this.callData = JSON.parse(callDataStr);
    localStorage.removeItem('booli_call_data');
    
    const nameEl = document.getElementById('call-name');
    const avatarEl = document.getElementById('call-avatar');
    const audioCallAvatar = document.getElementById('audio-call-avatar');
    
    if (nameEl) nameEl.textContent = this.callData.contactName;
    if (avatarEl) avatarEl.textContent = this.callData.contactName.charAt(0).toUpperCase();
    if (audioCallAvatar) audioCallAvatar.textContent = this.callData.contactName.charAt(0).toUpperCase();
    
    // Set mode badge
    const modeBadge = document.getElementById('call-mode-badge');
    if (this.callData.callType === 'video') {
      modeBadge.textContent = '(Video)';
      this.isVideoMode = true;
    } else {
      modeBadge.textContent = '(Audio)';
      this.isVideoMode = false;
    }
    
    this.remoteVideoContainer = document.getElementById('remote-video-container');
    
    const savedTheme = localStorage.getItem('booli-theme') || 'dark';
    document.documentElement.setAttribute('data-theme', savedTheme);
    
    await this.initAgora();
    await this.joinCall();
    this.setupPIPDrag();
    
    this.listenForCallEnd();
  }
  
  setupPIPDrag() {
    const pipElement = document.getElementById('local-player');
    if (!pipElement) return;
    
    let isDragging = false;
    let startX, startY, startLeft, startTop;
    
    const onMouseDown = (e) => {
      if (e.target === pipElement || pipElement.contains(e.target)) {
        isDragging = true;
        startX = e.clientX;
        startY = e.clientY;
        const rect = pipElement.getBoundingClientRect();
        startLeft = rect.left;
        startTop = rect.top;
        pipElement.style.cursor = 'grabbing';
        pipElement.style.transition = 'none';
        e.preventDefault();
      }
    };
    
    const onMouseMove = (e) => {
      if (!isDragging) return;
      let newLeft = startLeft + (e.clientX - startX);
      let newTop = startTop + (e.clientY - startY);
      const maxLeft = window.innerWidth - pipElement.offsetWidth - 20;
      const maxTop = window.innerHeight - pipElement.offsetHeight - 100;
      newLeft = Math.min(Math.max(10, newLeft), maxLeft);
      newTop = Math.min(Math.max(10, newTop), maxTop);
      pipElement.style.left = newLeft + 'px';
      pipElement.style.top = newTop + 'px';
      pipElement.style.right = 'auto';
      pipElement.style.bottom = 'auto';
    };
    
    const onMouseUp = () => {
      if (isDragging) {
        isDragging = false;
        pipElement.style.cursor = 'grab';
        pipElement.style.transition = '';
      }
    };
    
    pipElement.addEventListener('mousedown', onMouseDown);
    window.addEventListener('mousemove', onMouseMove);
    window.addEventListener('mouseup', onMouseUp);
    
    // Touch support for mobile
    let touchStartX, touchStartY, touchStartLeft, touchStartTop;
    let isTouching = false;
    
    const onTouchStart = (e) => {
      const touch = e.touches[0];
      touchStartX = touch.clientX;
      touchStartY = touch.clientY;
      const rect = pipElement.getBoundingClientRect();
      touchStartLeft = rect.left;
      touchStartTop = rect.top;
      isTouching = true;
      e.preventDefault();
    };
    
    const onTouchMove = (e) => {
      if (!isTouching) return;
      const touch = e.touches[0];
      let newLeft = touchStartLeft + (touch.clientX - touchStartX);
      let newTop = touchStartTop + (touch.clientY - touchStartY);
      const maxLeft = window.innerWidth - pipElement.offsetWidth - 20;
      const maxTop = window.innerHeight - pipElement.offsetHeight - 100;
      newLeft = Math.min(Math.max(10, newLeft), maxLeft);
      newTop = Math.min(Math.max(10, newTop), maxTop);
      pipElement.style.left = newLeft + 'px';
      pipElement.style.top = newTop + 'px';
      pipElement.style.right = 'auto';
      pipElement.style.bottom = 'auto';
    };
    
    const onTouchEnd = () => {
      isTouching = false;
    };
    
    pipElement.addEventListener('touchstart', onTouchStart);
    window.addEventListener('touchmove', onTouchMove);
    window.addEventListener('touchend', onTouchEnd);
    
    pipElement.style.left = 'auto';
    pipElement.style.right = '24px';
    pipElement.style.bottom = '24px';
    pipElement.style.top = 'auto';
    pipElement.style.cursor = 'grab';
  }
  
  listenForCallEnd() {
    const { db, doc, onSnapshot } = window._firebase;
    const callRef = doc(db, 'calls', this.callData.roomId);
    
    onSnapshot(callRef, (snap) => {
      const data = snap.data();
      if (data && (data.status === 'ended' || data.status === 'rejected') && !this.callEnded) {
        console.log("Call ended by other party");
        this.showToast("Call ended by the other participant", "info");
        this.endCall();
      }
    });
  }
  
  async initAgora() {
    try {
      this.client = AgoraRTC.createClient({ mode: "rtc", codec: "vp8" });
      this.setupClientEvents();
      return true;
    } catch (error) {
      console.error("Failed to initialize Agora:", error);
      return false;
    }
  }
  
  setupClientEvents() {
    this.client.on('user-published', async (user, mediaType) => {
      console.log(`Remote user published: ${user.uid}, mediaType: ${mediaType}`);
      
      const statusDiv = document.getElementById('connecting-status');
      if (statusDiv && !this.remoteStreamSubscribed) statusDiv.style.display = 'block';
      
      try {
        await this.client.subscribe(user, mediaType);
        console.log(`Subscribed to ${user.uid} for ${mediaType}`);
        
        if (mediaType === 'video') {
          this.remoteUserVideo = user;
          this.playRemoteVideo(user);
        }
        
        if (mediaType === 'audio') {
          user.audioTrack.play();
          this.remoteAudioSubscribed = true;
          console.log('Remote audio playing');
          
          setTimeout(() => {
            if (statusDiv) statusDiv.style.display = 'none';
            this.remoteStreamSubscribed = true;
          }, 1000);
        }
        
      } catch (error) {
        console.error(`Error subscribing to ${user.uid}:`, error);
        if (statusDiv) statusDiv.style.display = 'none';
      }
    });
    
    this.client.on('user-unpublished', (user, mediaType) => {
      console.log(`User unpublished: ${user.uid}, ${mediaType}`);
      if (mediaType === 'video') {
        const container = document.getElementById(`player-${user.uid}`);
        if (container) container.remove();
        this.remoteUserVideo = null;
      }
    });
    
    this.client.on('user-left', (user) => {
      console.log("User left:", user.uid);
      this.showToast("The other participant has left the call", "info");
      this.endCall();
    });
    
    this.client.on('connection-state-change', (curState, prevState) => {
      console.log(`Connection state: ${prevState} -> ${curState}`);
      const statusDiv = document.getElementById('connecting-status');
      if (curState === 'CONNECTED') {
        if (statusDiv) statusDiv.style.display = 'none';
      } else if (curState === 'CONNECTING') {
        if (statusDiv) statusDiv.style.display = 'block';
      }
    });
  }
  
  async joinCall() {
    try {
      const user = await this.waitForAuth();
      if (!user) {
        alert("Please login first");
        window.close();
        return;
      }
      
      console.log("Joining room:", this.callData.roomId);
      
      await this.client.join(this.callData.appId, this.callData.roomId, null, user.uid);
      console.log("Joined channel");
      
      if (!this.callData.isInitiator && window.opener) {
        window.opener.postMessage({ type: 'CALL_ACCEPTED' }, '*');
        console.log("Sent CALL_ACCEPTED to parent");
        await this.updateCallStatus('active');
      }
      
      // Always start with audio only
      const audioTrack = await AgoraRTC.createMicrophoneAudioTrack();
      this.localTracks = [audioTrack];
      
      // If this is a video call from start, add video track
      if (this.callData.callType === 'video') {
        const cameraTrack = await AgoraRTC.createCameraVideoTrack();
        this.localTracks.push(cameraTrack);
        this.isVideoMode = true;
        this.switchToVideoUI();
      }
      
      await this.client.publish(this.localTracks);
      console.log("Published local tracks");
      this.isCallActive = true;
      
      if (this.isVideoMode && this.localTracks[1]) {
        this.playLocalVideo();
      }
      
      this.startTimer();
      
      // Update UI based on mode
      const audioCallAvatar = document.getElementById('audio-call-avatar');
      if (audioCallAvatar) {
        if (this.isVideoMode) {
          audioCallAvatar.style.display = 'none';
        } else {
          audioCallAvatar.style.display = 'flex';
        }
      }
      
      if (this.localTracks[0]) {
        this.localTracks[0].setEnabled(true);
      }
      
    } catch (error) {
      console.error("Error joining call:", error);
      this.showToast("Failed to join call", "error");
      this.endCall();
    }
  }
  
  // Upgrade from Audio to Video Call
  async upgradeToVideoCall() {
    if (this.isVideoMode) {
      this.showToast("Already in video mode", "info");
      return;
    }
    
    this.showUpgradeModal();
  }
  
  showUpgradeModal() {
    const modal = document.createElement('div');
    modal.className = 'upgrade-modal';
    modal.innerHTML = `
      <div class="upgrade-card">
        <i class="fas fa-video"></i>
        <h3>Switch to Video Call</h3>
        <p>Do you want to turn on your camera and switch to video call?</p>
        <div class="upgrade-buttons">
          <button class="upgrade-btn accept" onclick="window.callManager.confirmUpgradeToVideo()">
            <i class="fas fa-video"></i> Yes, Switch
          </button>
          <button class="upgrade-btn cancel" onclick="this.closest('.upgrade-modal').remove()">
            Cancel
          </button>
        </div>
      </div>
    `;
    document.body.appendChild(modal);
  }
  
  async confirmUpgradeToVideo() {
    const modal = document.querySelector('.upgrade-modal');
    if (modal) modal.remove();
    
    try {
      this.showToast("Switching to video call...", "info");
      
      const cameraTrack = await AgoraRTC.createCameraVideoTrack();
      await this.client.publish(cameraTrack);
      this.localTracks.push(cameraTrack);
      this.isVideoMode = true;
      
      this.playLocalVideo();
      this.switchToVideoUI();
      
      const audioCallAvatar = document.getElementById('audio-call-avatar');
      if (audioCallAvatar) audioCallAvatar.style.display = 'none';
      
      const modeBadge = document.getElementById('call-mode-badge');
      if (modeBadge) modeBadge.textContent = '(Video)';
      
      this.showToast("Video call started!", "success");
      
    } catch (error) {
      console.error("Error upgrading to video:", error);
      this.showToast("Failed to start video. Please check camera permissions.", "error");
    }
  }
  
  switchToVideoUI() {
    // Hide audio controls, show video controls
    const audioControls = document.getElementById('audio-controls');
    const videoControls = document.getElementById('video-controls');
    if (audioControls) audioControls.style.display = 'none';
    if (videoControls) videoControls.style.display = 'flex';
    
    // Update mic button states
    const videoMicBtn = document.getElementById('video-mic-btn');
    const headerMicBtn = document.getElementById('mute-header-btn');
    if (this.isMuted) {
      if (videoMicBtn) videoMicBtn.classList.add('mic-off');
      if (headerMicBtn) headerMicBtn.classList.add('mic-off');
    }
    
    // Show switch camera option in menu
    const switchCamOption = document.getElementById('switch-cam-option');
    if (switchCamOption) switchCamOption.style.display = 'flex';
  }
  
  playLocalVideo() {
    if (!this.remoteVideoContainer) return;
    
    const localContainer = document.getElementById('local-player');
    if (localContainer) {
      localContainer.classList.add('visible');
      const videoTrack = this.localTracks.find(t => t && t.trackMediaType === 'video');
      if (videoTrack) {
        videoTrack.play(localContainer);
      }
    }
    console.log("Local video playing");
  }
  
  playRemoteVideo(user) {
    if (!this.remoteVideoContainer) return;
    
    const localPlayer = document.getElementById('local-player');
    const audioCallAvatar = document.getElementById('audio-call-avatar');
    
    if (audioCallAvatar) audioCallAvatar.style.display = 'none';
    
    // Clear container but preserve local player
    const remoteContainer = document.createElement('div');
    remoteContainer.id = `player-${user.uid}`;
    remoteContainer.style.width = '100%';
    remoteContainer.style.height = '100%';
    remoteContainer.style.position = 'relative';
    remoteContainer.style.zIndex = '1';
    
    this.remoteVideoContainer.innerHTML = '';
    this.remoteVideoContainer.appendChild(remoteContainer);
    
    if (localPlayer) {
      this.remoteVideoContainer.appendChild(localPlayer);
    }
    
    if (user.videoTrack) {
      user.videoTrack.play(remoteContainer);
    }
    console.log("Remote video playing");
  }
  
  // ========== Video Call Functions ==========
  
  toggleCamera() {
    if (!this.isVideoMode) {
      this.showToast("Please enable camera first", "info");
      return;
    }
    
    const videoTrack = this.localTracks.find(t => t && t.trackMediaType === 'video');
    if (!videoTrack) {
      this.showToast("No video track found", "error");
      return;
    }
    
    this.isCameraOn = !this.isCameraOn;
    const cameraBtn = document.getElementById('video-camera-btn');
    
    if (!this.isCameraOn) {
      videoTrack.setEnabled(false);
      if (cameraBtn) cameraBtn.classList.add('cam-off');
      this.showToast("Camera turned off", "info");
    } else {
      videoTrack.setEnabled(true);
      if (cameraBtn) cameraBtn.classList.remove('cam-off');
      this.showToast("Camera turned on", "info");
    }
  }
  
  async switchCamera() {
    if (!this.isVideoMode) {
      this.showToast("Please enable camera first", "info");
      return;
    }
    
    const videoTrack = this.localTracks.find(t => t && t.trackMediaType === 'video');
    if (videoTrack) {
      try {
        const devices = await AgoraRTC.getCameras();
        if (devices.length > 1) {
          const currentDevice = await videoTrack.getCurrentDevice();
          const nextDevice = devices.find(d => d.deviceId !== currentDevice?.deviceId);
          if (nextDevice) {
            await videoTrack.setDevice(nextDevice.deviceId);
            this.showToast('Camera switched', 'success');
          }
        } else {
          this.showToast('Only one camera available', 'info');
        }
      } catch (err) {
        console.error("Switch camera error:", err);
        this.showToast("Failed to switch camera", "error");
      }
    }
  }
  
  toggleRaiseHand() {
    this.isHandRaised = !this.isHandRaised;
    const raiseHandBtn = document.getElementById('raise-hand-btn');
    const indicator = document.getElementById('raised-hand-indicator');
    
    if (this.isHandRaised) {
      if (raiseHandBtn) {
        raiseHandBtn.classList.add('raised-hand');
        raiseHandBtn.innerHTML = '<i class="fas fa-hand-peace"></i><span>Lower</span>';
      }
      if (indicator) indicator.style.display = 'flex';
      this.showToast('Hand raised', 'info');
    } else {
      if (raiseHandBtn) {
        raiseHandBtn.classList.remove('raised-hand');
        raiseHandBtn.innerHTML = '<i class="fas fa-hand-paper"></i><span>Raise</span>';
      }
      if (indicator) indicator.style.display = 'none';
      this.showToast('Hand lowered', 'info');
    }
  }
  
  // ========== Common Functions ==========
  
  async toggleRecording() {
    if (!this.isRecording) {
      await this.startRecording();
    } else {
      this.stopRecording();
    }
  }
  
  async startRecording() {
    try {
      const stream = await navigator.mediaDevices.getDisplayMedia({ video: true, audio: true });
      this.recordingStream = stream;
      this.mediaRecorder = new MediaRecorder(stream);
      this.recordedChunks = [];
      
      this.mediaRecorder.ondataavailable = (e) => {
        if (e.data.size > 0) {
          this.recordedChunks.push(e.data);
        }
      };
      
      this.mediaRecorder.onstop = () => {
        const blob = new Blob(this.recordedChunks, { type: 'video/webm' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `call_recording_${Date.now()}.webm`;
        a.click();
        URL.revokeObjectURL(url);
        this.showToast('Recording saved!', 'success');
        
        if (this.recordingStream) {
          this.recordingStream.getTracks().forEach(track => track.stop());
        }
        
        this.updateRecordButtons(false);
        const indicator = document.getElementById('recording-indicator');
        if (indicator) indicator.style.display = 'none';
      };
      
      this.mediaRecorder.start();
      this.isRecording = true;
      this.updateRecordButtons(true);
      
      const indicator = document.getElementById('recording-indicator');
      if (indicator) indicator.style.display = 'flex';
      
      this.showToast('Recording started', 'info');
    } catch (error) {
      console.error('Recording error:', error);
      this.showToast('Failed to start recording', 'error');
    }
  }
  
  stopRecording() {
    if (this.mediaRecorder && this.mediaRecorder.state === 'recording') {
      this.mediaRecorder.stop();
      this.isRecording = false;
    }
  }
  
  updateRecordButtons(isRecording) {
    const audioRecordBtn = document.getElementById('audio-record-btn');
    const videoRecordBtn = document.getElementById('video-record-btn');
    
    if (isRecording) {
      if (audioRecordBtn) {
        audioRecordBtn.classList.add('recording');
        audioRecordBtn.innerHTML = '<i class="fas fa-stop"></i><span>Stop</span>';
      }
      if (videoRecordBtn) {
        videoRecordBtn.classList.add('recording');
        videoRecordBtn.innerHTML = '<i class="fas fa-stop"></i><span>Stop</span>';
      }
    } else {
      if (audioRecordBtn) {
        audioRecordBtn.classList.remove('recording');
        audioRecordBtn.innerHTML = '<i class="fas fa-record-vinyl"></i><span>Record</span>';
      }
      if (videoRecordBtn) {
        videoRecordBtn.classList.remove('recording');
        videoRecordBtn.innerHTML = '<i class="fas fa-record-vinyl"></i><span>Record</span>';
      }
    }
  }
  
  showAddPeople() {
    const modal = document.createElement('div');
    modal.className = 'add-people-modal';
    modal.innerHTML = `
      <div class="add-people-card">
        <h3><i class="fas fa-user-plus"></i> Add People</h3>
        <input type="text" class="contact-search" id="contact-search" placeholder="Search by name...">
        <div class="contact-list" id="contact-list">
          <div style="text-align:center;padding:20px;color:var(--text-secondary);">
            <i class="fas fa-spinner fa-spin"></i> Loading contacts...
          </div>
        </div>
        <button class="close-modal-btn" onclick="this.closest('.add-people-modal').remove()">Close</button>
      </div>
    `;
    document.body.appendChild(modal);
    this.loadContactsForAdd();
    
    const searchInput = document.getElementById('contact-search');
    if (searchInput) {
      searchInput.addEventListener('input', () => this.filterContacts(searchInput.value));
    }
  }
  
  async loadContactsForAdd() {
    try {
      const { db, collection, getDocs, query, where } = window._firebase;
      const user = await this.waitForAuth();
      if (!user) return;
      
      const q = query(collection(db, 'chats'), where('participants', 'array-contains', user.uid));
      const snapshot = await getDocs(q);
      const contacts = [];
      
      snapshot.forEach(doc => {
        const data = doc.data();
        const otherId = data.participants?.find(p => p !== user.uid);
        if (otherId && data.participantNames && data.participantNames[otherId]) {
          contacts.push({
            id: otherId,
            name: data.participantNames[otherId]
          });
        }
      });
      
      this.availableContacts = contacts;
      this.renderContactList(contacts);
    } catch (error) {
      console.error('Error loading contacts:', error);
      const list = document.getElementById('contact-list');
      if (list) {
        list.innerHTML = '<div style="text-align:center;padding:20px;color:var(--error);">Failed to load contacts</div>';
      }
    }
  }
  
  renderContactList(contacts) {
    const list = document.getElementById('contact-list');
    if (!list) return;
    
    if (contacts.length === 0) {
      list.innerHTML = '<div style="text-align:center;padding:20px;color:var(--text-secondary);">No contacts available</div>';
      return;
    }
    
    list.innerHTML = contacts.map(contact => `
      <div class="contact-item" onclick="window.callManager.inviteToCall('${contact.id}', '${this.escapeHtml(contact.name)}')">
        <div class="contact-avatar">${contact.name.charAt(0).toUpperCase()}</div>
        <div class="contact-name">${this.escapeHtml(contact.name)}</div>
        <i class="fas fa-plus-circle" style="color:var(--primary);"></i>
      </div>
    `).join('');
  }
  
  filterContacts(search) {
    if (!this.availableContacts) return;
    const filtered = this.availableContacts.filter(c => 
      c.name.toLowerCase().includes(search.toLowerCase())
    );
    this.renderContactList(filtered);
  }
  
  async inviteToCall(userId, userName) {
    this.showToast(`Inviting ${userName} to join...`, 'info');
    const modal = document.querySelector('.add-people-modal');
    if (modal) modal.remove();
    setTimeout(() => {
      this.showToast(`Invitation sent to ${userName}`, 'success');
    }, 1000);
  }
  
  async updateCallStatus(status) {
    try {
      const { db, doc, updateDoc } = window._firebase;
      await updateDoc(doc(db, 'calls', this.callData.roomId), {
        status: status,
        updatedAt: new Date()
      });
    } catch (e) {
      console.error("Error updating call status:", e);
    }
  }
  
  waitForAuth() {
    return new Promise((resolve) => {
      if (window._firebase && window._firebase.onAuthStateChanged) {
        window._firebase.onAuthStateChanged(window._firebase.auth, (user) => {
          resolve(user);
        });
      } else {
        setTimeout(() => this.waitForAuth().then(resolve), 500);
      }
    });
  }
  
  startTimer() {
    this.callStartTime = Date.now();
    this.callTimer = setInterval(() => {
      if (!this.callEnded) {
        this.callDuration = Math.floor((Date.now() - this.callStartTime) / 1000);
        const minutes = Math.floor(this.callDuration / 60);
        const seconds = this.callDuration % 60;
        const timerText = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
        const statusText = document.getElementById('call-status-text');
        if (statusText) {
          const modeText = this.isVideoMode ? ' (Video)' : '';
          statusText.innerHTML = `<span class="call-timer">${timerText}</span><span id="call-mode-badge" style="color: var(--primary); font-size: 10px; margin-left: 6px;">${modeText}</span>`;
        }
      }
    }, 1000);
  }
  
  toggleMute() {
    if (!this.localTracks || !this.localTracks[0]) {
      this.showToast("No audio track found", "error");
      return;
    }
    this.isMuted = !this.isMuted;
    
    const audioMicBtn = document.getElementById('audio-mic-btn');
    const videoMicBtn = document.getElementById('video-mic-btn');
    const headerMicBtn = document.getElementById('mute-header-btn');
    
    if (this.isMuted) {
      this.localTracks[0].setEnabled(false);
      if (audioMicBtn) audioMicBtn.classList.add('mic-off');
      if (videoMicBtn) videoMicBtn.classList.add('mic-off');
      if (headerMicBtn) headerMicBtn.classList.add('mic-off');
      this.showToast("Microphone muted", "info");
    } else {
      this.localTracks[0].setEnabled(true);
      if (audioMicBtn) audioMicBtn.classList.remove('mic-off');
      if (videoMicBtn) videoMicBtn.classList.remove('mic-off');
      if (headerMicBtn) headerMicBtn.classList.remove('mic-off');
      this.showToast("Microphone unmuted", "info");
    }
  }
  
  toggleSpeaker() {
    if (this.client && this.client.setEnableSpeakerphone) {
      this._speakerEnabled = !this._speakerEnabled;
      this.client.setEnableSpeakerphone(this._speakerEnabled);
      this.showToast(this._speakerEnabled ? "Speaker enabled" : "Speaker disabled", "info");
    } else {
      this.showToast("Speaker toggle feature", "info");
    }
  }
  
  toggleCallMenu(event) {
    if (event) event.stopPropagation();
    
    const menu = document.getElementById('call-options-menu');
    if (menu) {
      const isVisible = menu.style.display === 'block';
      menu.style.display = isVisible ? 'none' : 'block';
      
      if (!isVisible) {
        setTimeout(() => {
          document.addEventListener('click', function closeDropdown(e) {
            if (!menu.contains(e.target) && !e.target.closest('.call-header-btn')) {
              menu.style.display = 'none';
              document.removeEventListener('click', closeDropdown);
            }
          });
        }, 0);
      }
    }
  }
  
  async endCall() {
    if (this.callEnded) return;
    this.callEnded = true;
    
    console.log("Ending call from window...");
    this.isCallActive = false;
    
    if (this.callTimer) {
      clearInterval(this.callTimer);
      this.callTimer = null;
    }
    
    if (this.isRecording) {
      this.stopRecording();
    }
    
    if (this.isScreenSharing && this.screenTrack) {
      const screenVideoTrack = Array.isArray(this.screenTrack) ? this.screenTrack[0] : this.screenTrack;
      if (screenVideoTrack) screenVideoTrack.close();
      this.screenTrack = null;
      this.isScreenSharing = false;
    }
    
    if (this.localTracks && this.localTracks.length) {
      this.localTracks.forEach(track => {
        if (track && track.close) track.close();
      });
      this.localTracks = [];
    }
    
    if (this.client) {
      try {
        await this.client.leave();
        console.log("Left Agora channel");
      } catch(e) {
        console.error("Error leaving channel:", e);
      }
    }
    
    if (this.callData && this.callData.roomId && !this.callData.isInitiator) {
      await this.updateCallStatus('ended');
    }
    
    if (window.opener) {
      window.opener.postMessage({ type: 'CALL_ENDED' }, '*');
    }
    
    setTimeout(() => window.close(), 500);
  }
  
  showToast(msg, type = 'info') {
    const toast = document.createElement('div');
    toast.style.cssText = `
      position: fixed;
      bottom: 100px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--card);
      border: 1px solid var(--border);
      color: var(--text-primary);
      padding: 10px 20px;
      border-radius: 30px;
      font-size: 13px;
      z-index: 2000;
      box-shadow: var(--shadow);
      animation: slideUp 0.3s ease;
      white-space: nowrap;
    `;
    toast.textContent = msg;
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 2000);
  }
  
  escapeHtml(str) {
    if (!str) return '';
    return String(str).replace(/[&<>]/g, function(m) {
      if (m === '&') return '&amp;';
      if (m === '<') return '&lt;';
      if (m === '>') return '&gt;';
      return m;
    });
  }
}

const callManager = new CallManager();
window.callManager = callManager;
callManager.init();

window.addEventListener('beforeunload', () => {
  if (callManager && !callManager.callEnded) {
    callManager.endCall();
  }
});
</script>
